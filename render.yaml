services:
  - type: web
    name: trafficmaxxers
    runtime: docker
    repo: https://github.com/rakeshselvaraj0108/cepheus
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: USE_REAL_WEATHER
        value: "true"
      - key: SIMULATION_SPEED
        value: "1.0"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false


